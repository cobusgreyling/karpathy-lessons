name: Deploy showcase to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare static showcase site
        run: |
          mkdir -p site
          cp index.html site/index.html
          cp social-preview.png site/social-preview.png
          # Also expose the source markdown files under /docs for easy linking
          mkdir -p site/docs
          cp -r docs/*.md site/docs/
          cp LICENSE site/LICENSE.txt 2>/dev/null || true
          cp README.md site/README.md 2>/dev/null || true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
